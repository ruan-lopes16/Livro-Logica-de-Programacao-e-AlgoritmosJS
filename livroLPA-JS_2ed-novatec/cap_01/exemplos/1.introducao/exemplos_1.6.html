<!--Elaborar um programa que leia dois números. Calcule e informe a soma desses números
-entrada de dados: ler número
-processamento: calcular a soma
-saida: informar a soma -->

<meta charset="utf-8">
<script>
    const n1 = Number(prompt('Digite o primeiro valor:')) //lê os numeros
    const n2 = Number(prompt('Digite o segundo valor:'))

    const soma = n1 + n2 //calcula
    alert(`A soma de ${n1} + ${n2} é ${soma}`) //informa a soma
</script>
