<!--Entrada de dados e uso de variável - para recebimento do nome e saudação-->

<meta charset="UTF-8"> <!--tag HTML para ajustar acentuações para serem exibidas na tela-->
<script>
    const nome = prompt('Qual o seu nome?') //declara uma variável e executa um método(prompt) - O nome digitado no "prompt" é atribuido à variável "nome"
    alert('Olá, '+ nome + '! Vamos dar os primeiros passos em JS!!!') 
    //janela de alerta no navegador com 'Olá ' +(concatenação/juntar) o nome digitado em PROMPT +(concatenação/juntar) '! Vamos dar os primeiros passos em JS!!!'

//outra de representar alert('Olá, '+ nome + '! Vamos dar os primeiros passos em JS!!!') -> colocando CRASE no lugar das aspas duplas ou aspas simples
    //alert(`Olá, ${nome}! Vamos dar os primeiros passos em JS!!!`)
</script>
