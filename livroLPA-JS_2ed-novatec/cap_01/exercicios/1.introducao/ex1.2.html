<!--Elaborar um programa para uma pizzaria, o qual leia o valor total de uma conta
e quantos clientes vão pagá-la. Calcule e informe o valor a ser pago por cliente-->

<script>
    const totConta = Number(prompt('Qual o total da conta?'))
    const totCliente = Number(prompt('Quantos clientes irão pagá-la?'))
    const divCliente = totConta / totCliente

    alert(`Total: R$${totConta.toFixed(2)}\nO valor dividido para ${totCliente} pessoas é igual a R$${divCliente.toFixed(2)}`)
</script>
