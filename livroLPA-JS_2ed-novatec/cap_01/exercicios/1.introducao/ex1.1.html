<!--Elaborar um programa que leia um número. Calcule e informe os seus vizinhos, 
ou seja, o número anterior e o sucessor-->

<script>
    const num = Number(prompt('Digite uum número para ver seu antecessor e seu sucessor'))
    const ant = num - 1
    const suc = num + 1

    alert(`N° digitado: ${num}\nAntecessor: ${ant}\nSucessor: ${suc}`)
</script>
