<!--/*
Elaborae um programa que leia um número. Calcule e informe o dobro desse número 
-entrada de dados: ler número
-processamento: calcular dobro
-saida: informar o dobro 
*/-->

<meta charset="utf-8">
<script>
    const num = Number(prompt('Digite um número para exibir seu dobro: ')) //deixando const definida do tipo numero e lê o dado
    const dobro = num * 2 //calcula

    console.log(`O dobro de ${num} é ${dobro}`) //informa o dobro
    alert(`O dobro de ${num} é ${dobro}`)
</script>
