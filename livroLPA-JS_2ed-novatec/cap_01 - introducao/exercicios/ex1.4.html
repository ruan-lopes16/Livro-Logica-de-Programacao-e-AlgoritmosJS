<!--Elaborar um programa que lia 2 notas de um aluno em uma disciplina>
Calcule e informe a média das notas-->

<script>
    const nota1 = Number(prompt('Qual a primeira nota?'))
    const nota2 = Number(prompt('Qual a segunda nota?'))
    const media = (nota1 + nota2) / 2

    alert(`O aluno tirou as respectivas notas ${nota1.toFixed(2)} e ${nota2.toFixed(2)}\nMédia: ${media.toFixed(2)} pontos`)
</script>
